version: "3.9"

services:
  # ── PostgreSQL Database ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: soundwave_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-soundwave}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-soundwave_secret}
      POSTGRES_DB:       ${POSTGRES_DB:-soundwave}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-soundwave}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Cache ───────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: soundwave_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ───────────────────────────────────────────────────────────
  api:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: soundwave_api
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      NODE_ENV:              production
      PORT:                  4000
      DATABASE_URL:          postgresql://${POSTGRES_USER:-soundwave}:${POSTGRES_PASSWORD:-soundwave_secret}@postgres:5432/${POSTGRES_DB:-soundwave}
      REDIS_URL:             redis://redis:6379
      JWT_SECRET:            ${JWT_SECRET:?JWT_SECRET required}
      JWT_REFRESH_SECRET:    ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET required}
      STRIPE_SECRET_KEY:     ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      AWS_REGION:            ${AWS_REGION}
      AWS_ACCESS_KEY_ID:     ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_BUCKET:             ${S3_BUCKET}
      APP_URL:               ${APP_URL:-http://localhost:3000}
      ALLOWED_ORIGINS:       ${ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "4000:4000"
    volumes:
      - ./backend/logs:/app/logs

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:4000/api}
        NEXT_PUBLIC_STRIPE_KEY: ${NEXT_PUBLIC_STRIPE_KEY}
    container_name: soundwave_frontend
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL:    ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
      NEXT_PUBLIC_STRIPE_KEY: ${NEXT_PUBLIC_STRIPE_KEY}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: soundwave_network
